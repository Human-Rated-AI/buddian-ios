name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > Buddian/GoogleService-Info.plist

      - name: List available Xcode versions
        run: ls /Applications/Xcode*.app 2>/dev/null || echo "No Xcode found"

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Buddian.xcodeproj \
            -scheme Buddian \
            -clonedSourcePackagesDirPath .spm-packages

      - name: Build for iOS Simulator
        run: |
          # Find first available iOS Simulator
          DEST=$(xcrun simctl list devices available | grep "iPhone" | grep -v "unavailable" | head -1 | sed 's/.*(\(.*\)).*/\1/')
          if [ -z "$DEST" ]; then
            echo "No iPhone simulator available, trying any iOS device..."
            DEST=$(xcrun simctl list devices available | grep "iOS" | grep -v "unavailable" | head -1 | sed 's/.*(\(.*\)).*/\1/')
          fi
          if [ -z "$DEST" ]; then
            echo "ERROR: No iOS Simulator found"
            xcrun simctl list devices
            exit 1
          fi
          echo "Using simulator: $DEST"
          xcodebuild build \
            -project Buddian.xcodeproj \
            -scheme Buddian \
            -destination "platform=iOS Simulator,id=$DEST" \
            -configuration Debug \
            -clonedSourcePackagesDirPath .spm-packages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify no secrets in source
        run: |
          echo "Checking for leaked secrets..."
          if grep -r "sk_live\|sk_test\|password.*=.*['\"]" --include="*.swift" --include="*.plist" .; then
            echo "ERROR: Possible secrets found in source!"
            exit 1
          fi
          echo "No secrets found."

      - name: Verify GoogleService-Info.plist is gitignored
        run: |
          if git ls-files --error-unmatch Buddian/GoogleService-Info.plist 2>/dev/null; then
            echo "ERROR: GoogleService-Info.plist is tracked by git — should be gitignored!"
            exit 1
          fi
          echo "GoogleService-Info.plist is properly gitignored."

      - name: Check file count
        run: |
          SWIFT_COUNT=$(find Buddian -name "*.swift" | wc -l | tr -d ' ')
          echo "Swift files: $SWIFT_COUNT"
          if [ "$SWIFT_COUNT" -lt 15 ]; then
            echo "ERROR: Expected at least 15 Swift files, found $SWIFT_COUNT"
            exit 1
          fi
