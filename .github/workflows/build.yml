name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: |
          xcodebuild -project Buddian.xcodeproj \
            -scheme Buddian \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build

      - name: Test
        run: |
          xcodebuild test \
            -project Buddian.xcodeproj \
            -scheme Buddian \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            || true
