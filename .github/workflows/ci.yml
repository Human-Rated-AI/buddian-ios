name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS Simulator runtime
        run: |
          # Download and install the iOS 18.2 simulator runtime
          xcodebuild -downloadPlatform iOS
          sudo xcodebuild -importPlatform iOS

      - name: Decode GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > Buddian/GoogleService-Info.plist

      - name: Build
        run: ./build.sh

      - name: Verify no secrets in source
        run: |
          echo "Checking for leaked secrets..."
          if grep -r "sk_live\|sk_test\|password.*=.*['\"]" --include="*.swift" --include="*.plist" .; then
            echo "ERROR: Possible secrets found in source!"
            exit 1
          fi
          echo "No secrets found."

      - name: Verify GoogleService-Info.plist is gitignored
        run: |
          if git ls-files --error-unmatch Buddian/GoogleService-Info.plist 2>/dev/null; then
            echo "ERROR: GoogleService-Info.plist is tracked by git — should be gitignored!"
            exit 1
          fi
          echo "GoogleService-Info.plist is properly gitignored."

      - name: Check file count
        run: |
          SWIFT_COUNT=$(find Buddian -name "*.swift" | wc -l | tr -d ' ')
          echo "Swift files: $SWIFT_COUNT"
          if [ "$SWIFT_COUNT" -lt 15 ]; then
            echo "ERROR: Expected at least 15 Swift files, found $SWIFT_COUNT"
            exit 1
          fi
